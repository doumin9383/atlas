[model]
name = "deepseek-v4-flash"
hf_id = "RedHatAI/DeepSeek-V4-Flash-NVFP4-FP8"
params = "284B"
active_params = "13B"
architecture = "MLA + MoE + mHC + Hybrid Attention (CSA/HCA)"

layers_total = 43
layers_full_attention = 43

hidden_dim = 4096
head_dim = 512
q_heads = 64
kv_heads = 1
intermediate_size = 2048

vocab_size = 129280
max_position_embeddings = 131072
rope_theta = 160000
partial_rotary_factor = 0.125

# MLA-specific
kv_lora_rank = 512
q_lora_rank = 1024
o_lora_rank = 1024
v_head_dim = 512
qk_rope_head_dim = 64
qk_nope_head_dim = 448

# MoE
num_experts = 256
num_shared_experts = 1
moe_intermediate_size = 2048
top_k = 6

# MTP (Multi-Module Token Prediction)
mtp_layers = 5

# Hyper-Connections (mHC)
hc_mult = 4
hc_sinkhorn_iters = 20
hc_eps = 1e-6

# YaRN RoPE scaling
yarn_factor = 16.0
yarn_beta_fast = 32.0
yarn_beta_slow = 1.0
yarn_original_max_position_embeddings = 65536

[[model_types]]
model_type = "deepseek_v4"

# DeepSeek V4 Flash uses hybrid attention (CSA/HCA) with compress_ratios.
# Currently falls back to full_attention; hybrid support is pending.
# o_lora_rank > 0 distinguishes Flash from V3/V4-Pro.

# Recommended sampling (DeepSeek V4 family defaults).
[sampling.thinking]
temperature = 1.0
top_p = 1.0
top_k = 0
presence_penalty = 0.0

[sampling.coding]
temperature = 1.0
top_p = 1.0
top_k = 0
presence_penalty = 0.0

[sampling.general]
temperature = 1.0
top_p = 0.95
top_k = 20
presence_penalty = 0.0

[behavior]
# Content-loop watchdog: enabled for DeepSeek V4 to prevent failure modes.
enable_loop_watchdog = true
# Thinking is controlled by template; V4 supports reasoning traces.
thinking_default = false

# KV cache dtype: FP8 matches Hugging Face reference (vLLM/SGLang use --kv-cache-dtype=fp8)
# The checkpoint is FP8/NVFP4 quantized; BF16 KV cache causes dtype mismatch and garbage output.
# This is the critical fix for the gibberish output issue.
default_kv_dtype = "fp8"
fp8_kv_calibration_tokens = 256
