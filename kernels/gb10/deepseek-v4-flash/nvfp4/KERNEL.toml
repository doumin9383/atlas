[build]
# DeepSeek-V4-Flash: MLA-specific kernels override HDIM inline.
# Do NOT pass -DHDIM globally; common paged-decode kernels only support 128/256/320.
extra_nvcc_flags = ["--fmad=false"]

# Module name overrides — matching Mistral Small 4 for MLA compatibility.
# Unlisted .cu files use their file stem as the module name.
[modules]
e2m1_branchless = "e2m1"
moe_permute = "moe"
dense_gemm_bf16 = "gemm"
dense_gemm_splitk = "gemm_splitk"
dense_gemm_tc = "gemm_tc"
rms_norm = "norm"
argmax_bf16 = "argmax"
dense_gemv_bf16 = "gemv"
dense_gemv_fp8w = "gemv_fp8w"
moe_shared_expert_fused_batch2 = "moe_fused_batch2"
moe_shared_expert_fused_batch3 = "moe_fused_batch3"
quantize_bf16_to_nvfp4 = "quantize_nvfp4"
paged_decode_attn = "paged_decode"
paged_decode_attn_mla = "paged_decode_mla"
paged_decode_attn_fp8 = "paged_decode_fp8"
paged_decode_attn_fp8_mla = "paged_decode_fp8_mla"
paged_decode_attn_nvfp4 = "paged_decode_nvfp4"
w4a16_gemm = "w4a16"
kv_cache_append = "kv_cache"
moe_w4a16_grouped_gemm = "moe_w4a16"
# DeepSeek-V4 uses sqrtsoftplus + correction-bias (noaux_tc) routing;
# MoeLayer::new loads `moe_topk_sqrtsoftplus`/`_batched` from the
# `moe_topk_sqrt` module. Sigmoid kernels remain available for fallback.
moe_topk_sigmoid = "moe_topk_sig"
moe_topk_sqrtsoftplus = "moe_topk_sqrt"
moe_sorted_prefill = "moe_sorted"
inferspark_prefill_paged = "prefill_paged"
inferspark_prefill_paged_fp8 = "prefill_paged_fp8"
inferspark_prefill_paged_nvfp4 = "prefill_paged_nvfp4"
inferspark_prefill_fp8kv = "prefill_fp8kv"
nemotron_moe_prefill = "nemotron_moe_prefill"
mla_absorbed = "mla_absorbed"
mla_prefill_attn = "mla_prefill_attn"
grouped_gemm_mla = "grouped_gemm_mla"
mla_fused_prefill = "mla_fused_prefill"
mla_paged_decode = "mla_paged_decode"
mla_paged_decode_fp8 = "mla_paged_decode_fp8"
reshape_and_cache_turbo = "reshape_and_cache_turbo"
paged_decode_attn_turbo4 = "paged_decode_turbo4"
wht_bf16 = "wht_bf16"
paged_decode_attn_turbo8 = "paged_decode_turbo8"
paged_decode_attn_turbo4_512 = "paged_decode_turbo4_512"
paged_decode_attn_turbo8_512 = "paged_decode_turbo8_512"
paged_decode_attn_turbo3 = "paged_decode_turbo3"
paged_decode_attn_turbo3_128 = "paged_decode_turbo3_128"
paged_decode_attn_turbo4_128 = "paged_decode_turbo4_128"
paged_decode_attn_turbo8_128 = "paged_decode_turbo8_128"
inferspark_prefill_512 = "inferspark_prefill_512"
paged_decode_attn_512 = "paged_decode_attn_512"
# Manifold-Constrained Hyper-Connections (mHC): hc_pre/hc_post/hc_head.
hyper_connection = "hyper_connection"
# DeepSeek Sparse Attention compressor (CSA/HCA window KV compression).
csa_compress = "csa_compress"
# CSA prefill attention over [raw causal | compressed windowed] KV + sink.
prefill_attn_compressed = "prefill_attn_compressed"
